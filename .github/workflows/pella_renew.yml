name: 🎮 Pella 自动续期
on:
  schedule:
    - cron: '0 1 * * *'    # 每天固定运行作为备用
  workflow_dispatch:       # 支持 GitHub 后台手动调试触发
  repository_dispatch:     # cron-job.org 通过 API 触发
    types: [pella_trigger]

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛠️ 安装系统依赖 (用于无头浏览器及硬件模拟)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb x11-utils xdotool

      - name: 🛡️ 安装并连接 Cloudflare WARP 官方代理
        uses: fscarmen/warp-on-actions@v1.4  # 👈 保持 WARP 通道开启

      - name: 🚀 运行续期脚本 (邮箱密码直接秒登)
        env:
          PELLA_ACCOUNT: ${{ secrets.PELLA_ACCOUNT }}
          TG_BOT:        ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            node pella_renew.js

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 7

name: 🎮 Pella 自动续期
on:
  schedule:
    - cron: '0 1 * * *'    # 每天固定运行作为备用
  workflow_dispatch:       # 手动调试触发
  repository_dispatch:     # cron-job.org 通过 API 触发
    types: [pella_trigger]

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛠️ 安装系统依赖 (用于 Turnstile 校验时模拟硬件物理点击)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb x11-utils xdotool

      - name: 🛡️ 启动 GOST 代理转发 (可选)
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      - name: 🚀 运行续期脚本 (Cookie 直接秒登版)
        env:
          PELLA_COOKIES_JSON: ${{ secrets.PELLA_COOKIES_JSON }}  # 👈 就是这一行，之前漏掉导致变量没传进去！
          PELLA_COOKIES_RAW:  ${{ secrets.PELLA_COOKIES_RAW }}
          TG_BOT:             ${{ secrets.TG_BOT }}
          GOST_PROXY:         http://127.0.0.1:8080
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            node pella_renew.js

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 7
